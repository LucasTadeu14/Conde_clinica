<header class="header" [class.menu-open]="isMenuOpen()" role="banner">
  <nav class="nav-header" aria-label="Navegação principal">

    <div class="nav-container">

      <a
        class="logo-link"
        href="#"
        (click)="scrollToTop($event)"
        role="button"
        tabindex="0"
        (keydown.enter)="scrollToTop($event)"
      >
        <img class="logo" src="assets/conde.png" alt="Conde Clínica - Logo" height="30">
      </a>

      <div class="nav-links-desktop">
        <a href="#" (click)="scrollOrNavigate('home', $event)">Home</a>
        <a href="#" (click)="scrollOrNavigate('services', $event)">Serviços</a>
        <a href="#" (click)="scrollOrNavigate('about', $event)">Sobre nós</a>
        <a href="#" (click)="scrollOrNavigate('results', $event)">Resultados</a>
        <a href="#" (click)="scrollOrNavigate('contact', $event)">Contato</a>
      </div>

      <a
        href="https://wa.me/5561991728260"
        target="_blank"
        rel="noopener noreferrer"
        class="btn-agendar btn-agendar-desktop"
      >
        Agendar
      </a>

      <button
        class="hamburger-btn"
        type="button"
        [attr.aria-label]="isMenuOpen() ? 'Fechar menu' : 'Abrir menu'"
        [attr.aria-expanded]="isMenuOpen()"
        (click)="toggleMenu()"
        #hamburgerBtn
      >
        <span class="hamburger-line hamburger-line-1"></span>
        <span class="hamburger-line hamburger-line-2"></span>
        <span class="hamburger-line hamburger-line-3"></span>
      </button>
    </div>
  </nav>

  <div
    class="menu-overlay"
    [class.visible]="isMenuOpen()"
    (click)="closeMenu()"
    role="button"
    tabindex="-1"
    aria-hidden="true"
  ></div>

  <div class="menu-mobile" [class.open]="isMenuOpen()" role="navigation" aria-label="Menu mobile">
    <div class="menu-mobile-inner">
      <a href="#" (click)="scrollOrNavigate('home', $event)">Home</a>
      <a href="#" (click)="scrollOrNavigate('services', $event)">Serviços</a>
      <a href="#" (click)="scrollOrNavigate('about', $event)">Sobre nós</a>
      <a href="#" (click)="scrollOrNavigate('results', $event)">Resultados</a>
      <a href="#" (click)="scrollOrNavigate('contact', $event)">Contato</a>
      <a
        href="https://wa.me/5561991728260"
        target="_blank"
        rel="noopener noreferrer"
        class="btn-agendar btn-agendar-mobile"
      >
        Agendar
      </a>
    </div>
  </div>
</header>
